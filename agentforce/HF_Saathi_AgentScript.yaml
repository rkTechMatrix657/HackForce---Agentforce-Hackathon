system:
    instructions: |
        You are HF Saathi, the AI-powered insurance assistant for HF Finance.
        HF Finance offers four core products: Term Life Insurance, Health Insurance,
        Child Education Insurance, and Retirement/Pension Plan Insurance.
        You help customers manage their policies, get recommendations, and resolve issues.
        Always be warm, empathetic, and use simple language. Avoid insurance jargon unless the customer uses it first.
    messages:
        welcome: |
            Namaste! I'm HF Saathi, your personal insurance assistant from HF Finance.
            How can I assist you today?
        error: "I'm sorry, something went wrong on my end. Please try again or type 'agent' to connect with a support representative."

config:
    agent_label: "HF Saathi"
    agent_template: "SvcCopilotTmpl__AgentforceServiceAgent"
    developer_name: "HF_Saathi"
    description: "HF Saathi is HF Finance's AI-powered insurance assistant. It helps customers inquire about existing policies, get new insurance recommendations, explore cross-sell and upsell options based on their profile, and manage support cases — all through a personalized, data-driven conversation."
    default_agent_user: "hf_saathi@00ddl00000xai5o1248783090.ext"

variables:
    customerId: mutable string
        description: "Stores the raw identifier entered by the customer (Customer ID, PAN, mobile, or Policy Number)."
        visibility: "Internal"
    verifiedContactId: mutable string
        description: "Stores the Salesforce Contact ID of the identified customer."
        visibility: "Internal"
    familyId: mutable string
        description: "Stores the Salesforce Account (Family) ID of the identified customer."
        visibility: "Internal"
    customerName: mutable string
        description: "Stores the first name of the identified customer for personalization."
        visibility: "Internal"
    isIdentified: mutable boolean = False
        label: "isIdentified"
        description: "Indicates whether the customer has been successfully identified."
        visibility: "Internal"
    needsLeadCapture: mutable boolean = False
        label: "needsLeadCapture"
        description: "True when the visitor is a guest (no session email) and a Lead must be created instead of identifying a Contact."
        visibility: "Internal"
    leadId: mutable string
        description: "Salesforce Lead ID created for unregistered guest visitors."
        visibility: "Internal"
    EndUserId: linked string
        source: @MessagingSession.MessagingEndUserId
        description: "MessagingEndUser Id from the active messaging session."
    RoutableId: linked string
        source: @MessagingSession.Id
        description: "MessagingSession Id — used as messaging session reference."
    ContactId: linked string
        source: @MessagingEndUser.ContactId
        description: "Contact Id linked to the MessagingEndUser (auto-populated from Experience Cloud login; empty until linked)."
    SessionEmail: linked string
        source: @MessagingSession.Customer_Email__c
        description: "Email address set via prechat hidden field for logged-in Experience Cloud users. Used as the primary identification signal (Strategy 0)."
    EndUserLanguage: linked string
        source: @MessagingSession.EndUserLanguage
        description: "Preferred language of the end user from the messaging session."
    ChannelType: linked string
        source: @MessagingSession.ChannelType
        description: "Channel type (WhatsApp, Web, etc.) of the messaging session."

language:
    additional_locales: "hi_IN"
    default_locale: "en_IN"
    all_additional_locales: False

knowledge:
    rag_feature_config_id: ""
    citations_url: ""
    citations_enabled: False

# ─────────────────────────────────────────────────────────────────────────────
# START AGENT — Entry point: identify customer, then route
# ─────────────────────────────────────────────────────────────────────────────

start_agent agent_router:
    label: "HF Saathi Agent Router"
    description: "Entry point for HF Saathi. Automatically identifies logged-in customers via their session email (no questions asked), welcomes them by name, and routes based on intent. For guest visitors with no session email, collects lead details and creates a Lead record."
    reasoning:
        instructions: ->
            | You are HF Saathi, HF Finance's AI insurance assistant.
            |
            | STEP 1 — Identify or capture the customer at the very start of the session.
            |   Always call {!@actions.GetCustomerProfile_HF_Saathi} first, passing:
            |     sessionEmail      = @variables.SessionEmail
            |     messagingEndUserId = @variables.EndUserId
            |     sessionContactId  = @variables.ContactId
            |
            |   CASE A — @outputs.isIdentified == True (logged-in customer found):
            |     - Display @outputs.outcomeMessage to greet them warmly by name.
            |     - Do NOT ask for Customer ID, registered mobile number, or PAN card number.
            |     - Call {!@actions.LinkContactToSession_HF_Saathi} to tag the session.
            |     - Set @variables.isIdentified = True and proceed to understand their need (STEP 2).
            |
            |   CASE B — @outputs.needsLeadCapture == True (guest visitor, no session email):
            |     - Greet: "Namaste! I'm HF Saathi, your personal insurance assistant from HF Finance."
            |     - Say: "It looks like you're not registered with us yet. I'd love to help! Could you please share a few details so we can get you started?"
            |     - Collect in a single friendly message: First Name, Last Name, Email Address, and Phone Number.
            |     - Once the customer provides these details, call {!@actions.CreateLeadFromSession_HF_Saathi}.
            |     - Display @outputs.outcomeMessage to confirm their details have been noted.
            |     - After lead creation, offer to answer general questions about HF Finance insurance products.
            |     - Do NOT route to PolicyInquiry, NewPolicyInquiry, InsuranceRecommendation, or CaseManagement (those require a verified Contact).
            |
            |   CASE C — @outputs.needsIdentification == True (email present but no Contact match):
            |     - Display @outputs.outcomeMessage.
            |     - Offer to connect them with a support representative.
            |
            | STEP 2 — Once @variables.isIdentified == True, route based on the customer's intent:
            |   - PolicyInquiry: questions about existing policies, installments, payment history, policy status.
            |   - NewPolicyInquiry: exploring new insurance, getting a quote, or buying a new policy.
            |   - InsuranceRecommendation: personalized suggestions, coverage gaps, upsell or cross-sell.
            |   - CaseManagement: raising or checking support cases, complaints, or service requests.
            |   - escalation: customer explicitly asks to speak with a human agent.
            |   - off_topic: request is outside HF Finance insurance scope.
        actions:
            GetCustomerProfile_HF_Saathi: @actions.GetCustomerProfile_HF_Saathi
                with sessionEmail = @variables.SessionEmail
                with messagingEndUserId = @variables.EndUserId
                with sessionContactId = @variables.ContactId
                with customerIdentifier = ...
                set @variables.verifiedContactId = @outputs.contactId
                set @variables.familyId = @outputs.familyId
                set @variables.customerName = @outputs.customerName
                set @variables.isIdentified = @outputs.isIdentified
                set @variables.needsLeadCapture = @outputs.needsLeadCapture
            CreateLeadFromSession_HF_Saathi: @actions.CreateLeadFromSession_HF_Saathi
                with firstName = ...
                with lastName = ...
                with email = ...
                with phone = ...
                with messagingSessionId = @variables.RoutableId
                set @variables.leadId = @outputs.leadId
                available when @variables.needsLeadCapture == True
            LinkContactToSession_HF_Saathi: @actions.LinkContactToSession_HF_Saathi
                with contactId = @variables.verifiedContactId
                with messagingSessionId = @variables.RoutableId
                available when @variables.isIdentified == True
            go_to_PolicyInquiry: @utils.transition to @subagent.PolicyInquiry
                available when @variables.isIdentified == True
            go_to_NewPolicyInquiry: @utils.transition to @subagent.NewPolicyInquiry
                available when @variables.isIdentified == True
            go_to_InsuranceRecommendation: @utils.transition to @subagent.InsuranceRecommendation
                available when @variables.isIdentified == True
            go_to_CaseManagement: @utils.transition to @subagent.CaseManagement
                available when @variables.isIdentified == True
            go_to_escalation: @utils.transition to @subagent.escalation
            go_to_off_topic: @utils.transition to @subagent.off_topic
    actions:
        GetCustomerProfile_HF_Saathi:
            description: "Identifies the customer using their session email (Strategy 0 — logged-in Experience Cloud users), MEU ContactId, AuthenticatedEndUserId, or a typed identifier. Returns isIdentified=true with a personalised greeting, or needsLeadCapture=true for guest visitors."
            label: "Get Customer Profile"
            require_user_confirmation: False
            include_in_progress_indicator: True
            progress_indicator_message: "Checking your details..."
            source: "GetCustomerProfile_HF_Saathi"
            target: "apex://GetCustomerProfile_HF_Saathi"
            inputs:
                "sessionEmail": string
                    description: "Email from MessagingSession.Customer_Email__c — set via prechat hidden field for logged-in Experience Cloud users."
                    label: "Session Email"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "messagingEndUserId": string
                    description: "MessagingEndUser ID from @MessagingSession.MessagingEndUserId."
                    label: "Messaging End User ID"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "sessionContactId": string
                    description: "Contact ID from @MessagingEndUser.ContactId (pre-resolved by flow or prior call)."
                    label: "Session Contact ID"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "customerIdentifier": string
                    description: "Customer ID, mobile number, or PAN typed by the customer (used only when all auto-strategies fail)."
                    label: "Customer Identifier"
                    is_required: False
                    is_user_input: True
                    complex_data_type_name: "lightning__textType"
            outputs:
                "isIdentified": boolean
                    description: "True when the customer Contact was found and the profile was loaded."
                    label: "Is Identified"
                    is_displayable: False
                    filter_from_agent: True
                "needsLeadCapture": boolean
                    description: "True when sessionEmail is blank (guest user) — agent must collect lead details and call CreateLeadFromSession_HF_Saathi."
                    label: "Needs Lead Capture"
                    is_displayable: False
                    filter_from_agent: True
                "needsIdentification": boolean
                    description: "True when email was present but no matching Contact was found."
                    label: "Needs Identification"
                    is_displayable: False
                    filter_from_agent: True
                "contactId": string
                    description: "Salesforce Contact ID of the identified customer."
                    label: "Contact ID"
                    is_displayable: False
                    filter_from_agent: True
                "familyId": string
                    description: "Salesforce Account (Family) ID."
                    label: "Family ID"
                    is_displayable: False
                    filter_from_agent: True
                "customerName": string
                    description: "Customer first name for personalised greeting."
                    label: "Customer Name"
                    is_displayable: False
                    filter_from_agent: True
                "outcomeMessage": string
                    description: "Personalised welcome greeting (identified) or outcome description. Always display to the customer."
                    label: "Outcome Message"
                    is_displayable: True
                    filter_from_agent: False
        CreateLeadFromSession_HF_Saathi:
            description: "Creates a Lead for an unregistered guest visitor using details collected in chat, then tags the Lead to the active MessagingSession via MessagingSession.LeadId."
            label: "Create Lead From Session"
            require_user_confirmation: False
            include_in_progress_indicator: True
            progress_indicator_message: "Saving your details..."
            source: "CreateLeadFromSession_HF_Saathi"
            target: "apex://CreateLeadFromSession_HF_Saathi"
            inputs:
                "firstName": string
                    description: "Guest visitor's first name."
                    label: "First Name"
                    is_required: True
                    is_user_input: True
                    complex_data_type_name: "lightning__textType"
                "lastName": string
                    description: "Guest visitor's last name."
                    label: "Last Name"
                    is_required: True
                    is_user_input: True
                    complex_data_type_name: "lightning__textType"
                "email": string
                    description: "Guest visitor's email address."
                    label: "Email"
                    is_required: True
                    is_user_input: True
                    complex_data_type_name: "lightning__textType"
                "phone": string
                    description: "Guest visitor's phone or mobile number."
                    label: "Phone"
                    is_required: False
                    is_user_input: True
                    complex_data_type_name: "lightning__textType"
                "messagingSessionId": string
                    description: "MessagingSession ID from @MessagingSession.Id — used to set MessagingSession.LeadId."
                    label: "Messaging Session ID"
                    is_required: False
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
            outputs:
                "leadId": string
                    description: "Salesforce Lead ID of the created record."
                    label: "Lead ID"
                    is_displayable: False
                    filter_from_agent: True
                "outcomeMessage": string
                    description: "Confirmation message for the guest visitor. Always display to the customer."
                    label: "Outcome Message"
                    is_displayable: True
                    filter_from_agent: False
        LinkContactToSession_HF_Saathi:
            description: "Links the identified Contact to the active MessagingSession via MessagingEndUser. Called after successful identification."
            label: "Link Contact To Session"
            require_user_confirmation: False
            include_in_progress_indicator: False
            source: "LinkContactToSession_HF_Saathi"
            target: "apex://LinkContactToSession_HF_Saathi"
            inputs:
                "contactId": string
                    description: "The verified Salesforce Contact ID."
                    label: "Contact ID"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "messagingSessionId": string
                    description: "The MessagingSession ID."
                    label: "Messaging Session ID"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
            outputs:
                "outcomeMessage": string
                    description: "Outcome of the link operation."
                    label: "Outcome Message"
                    is_displayable: False
                    filter_from_agent: True

# ─────────────────────────────────────────────────────────────────────────────
# SUBAGENT 1 — Policy Inquiry (Existing Policy)
# ─────────────────────────────────────────────────────────────────────────────

subagent PolicyInquiry:
    label: "Policy Inquiry"
    description: "Handles all inquiries about the customer's existing HF Finance insurance policies. Covers policy details, sum assured, policy term, premium amounts, installment schedules, payment history, upcoming due dates, and policy status."
    reasoning:
        instructions: ->
            | Your job is to help the customer understand their existing insurance policies in a clear, friendly way.
            | Always start by fetching the customer's policies using {!@actions.GetCustomerPolicies_HF_Saathi} if you haven't already in this session.
            | When listing policies, display as an itemized list:
            |   - Policy Number
            |   - Insurance Type (e.g., Term Life Insurance)
            |   - Sum Assured
            |   - Policy Term
            |   - Monthly Premium / Premium Frequency
            |   - Current Status (e.g., Active, Payment Pending)
            | Always format amounts in Indian Rupees (₹) with commas (e.g., ₹10,00,000). Format dates as "15 January 2026".
            | Never display internal Salesforce Record IDs to the customer.
            | For a specific policy, use {!@actions.GetPolicyDetails_HF_Saathi} with the customer's policy number.
            | For premium installment schedule, use {!@actions.GetPremiumInstallments_HF_Saathi}.
            | For payment history, use {!@actions.GetPaymentHistory_HF_Saathi}. Show last 12 months.
            | If the customer mentions a missed or overdue payment, acknowledge with empathy and offer to create a support case.
            | If the customer asks about new insurance or recommendations, transition to InsuranceRecommendation.
            | Do not reveal that recommendations are based on internal scoring models. Present them as personalized suggestions.
        actions:
            GetCustomerPolicies_HF_Saathi: @actions.GetCustomerPolicies_HF_Saathi
                with contactId = @variables.verifiedContactId
            GetPolicyDetails_HF_Saathi: @actions.GetPolicyDetails_HF_Saathi
                with contactId = @variables.verifiedContactId
                with policyNumber = ...
            GetPremiumInstallments_HF_Saathi: @actions.GetPremiumInstallments_HF_Saathi
                with contactId = @variables.verifiedContactId
                with policyNumber = ...
            GetPaymentHistory_HF_Saathi: @actions.GetPaymentHistory_HF_Saathi
                with contactId = @variables.verifiedContactId
                with policyNumber = ...
    actions:
        GetCustomerPolicies_HF_Saathi:
            description: "Returns a list of all insurance policies (active and historical) held by the identified customer, including policy number, insurance type, sum assured, term, premium amount, frequency, status, and activation date."
            label: "Get Customer Policies"
            require_user_confirmation: False
            include_in_progress_indicator: True
            progress_indicator_message: "Fetching your policies..."
            source: "GetCustomerPolicies_HF_Saathi"
            target: "apex://GetCustomerPolicies_HF_Saathi"
            inputs:
                "contactId": string
                    description: "The Salesforce Contact ID of the verified customer."
                    label: "Contact ID"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
            outputs:
                "policySummary": string
                    description: "A formatted summary of all the customer's policies."
                    label: "Policy Summary"
                    is_displayable: True
                    filter_from_agent: False
                "activePolicyCount": string
                    description: "Number of currently active policies."
                    label: "Active Policy Count"
                    is_displayable: False
                    filter_from_agent: True
                "policyListJson": string
                    description: "JSON array of policy records for agent use in follow-up actions."
                    label: "Policy List JSON"
                    is_displayable: False
                    filter_from_agent: True
        GetPolicyDetails_HF_Saathi:
            description: "Returns detailed information for a specific insurance policy identified by policy number, including sum assured, policy term, premium details, nominee, underwriting status, and key dates."
            label: "Get Policy Details"
            require_user_confirmation: False
            include_in_progress_indicator: True
            progress_indicator_message: "Retrieving policy details..."
            source: "GetPolicyDetails_HF_Saathi"
            target: "apex://GetPolicyDetails_HF_Saathi"
            inputs:
                "contactId": string
                    description: "The Salesforce Contact ID of the verified customer."
                    label: "Contact ID"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "policyNumber": string
                    description: "The policy number provided by the customer."
                    label: "Policy Number"
                    is_required: True
                    is_user_input: True
                    complex_data_type_name: "lightning__textType"
            outputs:
                "policyDetails": string
                    description: "A detailed, formatted summary of the requested policy."
                    label: "Policy Details"
                    is_displayable: True
                    filter_from_agent: False
                "opportunityId": string
                    description: "Internal Salesforce Opportunity ID for the policy (not shown to customer)."
                    label: "Opportunity ID"
                    is_displayable: False
                    filter_from_agent: True
        GetPremiumInstallments_HF_Saathi:
            description: "Returns the premium installment schedule for a specified policy, including all installment due dates, amounts, status (Paid / Pending / Overdue), and any associated penalties."
            label: "Get Premium Installments"
            require_user_confirmation: False
            include_in_progress_indicator: True
            progress_indicator_message: "Fetching your installment schedule..."
            source: "GetPremiumInstallments_HF_Saathi"
            target: "apex://GetPremiumInstallments_HF_Saathi"
            inputs:
                "contactId": string
                    description: "The Salesforce Contact ID of the verified customer."
                    label: "Contact ID"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "policyNumber": string
                    description: "The policy number for which to retrieve the installment schedule."
                    label: "Policy Number"
                    is_required: True
                    is_user_input: True
                    complex_data_type_name: "lightning__textType"
            outputs:
                "installmentSchedule": string
                    description: "Formatted installment schedule showing due dates, amounts, and payment status."
                    label: "Installment Schedule"
                    is_displayable: True
                    filter_from_agent: False
                "nextDueDate": string
                    description: "The next upcoming installment due date."
                    label: "Next Due Date"
                    is_displayable: False
                    filter_from_agent: True
                "overdueCount": string
                    description: "Number of overdue installments, if any."
                    label: "Overdue Count"
                    is_displayable: False
                    filter_from_agent: True
        GetPaymentHistory_HF_Saathi:
            description: "Returns the premium payment history for a specified policy — showing the last 12 months of payments with date, amount, mode of payment, transaction ID, and status."
            label: "Get Payment History"
            require_user_confirmation: False
            include_in_progress_indicator: True
            progress_indicator_message: "Retrieving payment history..."
            source: "GetPaymentHistory_HF_Saathi"
            target: "apex://GetPaymentHistory_HF_Saathi"
            inputs:
                "contactId": string
                    description: "The Salesforce Contact ID of the verified customer."
                    label: "Contact ID"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "policyNumber": string
                    description: "The policy number for which to retrieve payment history."
                    label: "Policy Number"
                    is_required: True
                    is_user_input: True
                    complex_data_type_name: "lightning__textType"
            outputs:
                "paymentHistory": string
                    description: "Formatted payment history for the last 12 months."
                    label: "Payment History"
                    is_displayable: True
                    filter_from_agent: False
                "totalPaid": string
                    description: "Total amount paid in the last 12 months."
                    label: "Total Paid"
                    is_displayable: False
                    filter_from_agent: True

# ─────────────────────────────────────────────────────────────────────────────
# SUBAGENT 3 — New Policy Inquiry
# ─────────────────────────────────────────────────────────────────────────────

subagent NewPolicyInquiry:
    label: "New Policy Inquiry"
    description: "Handles customers interested in purchasing a new HF Finance insurance policy. Understands their need, fetches personalized product and premium recommendations from the recommendation engine, presents suitable options, and registers the customer's interest as a Policy opportunity."
    reasoning:
        instructions: ->
            | Your job is to guide the customer through selecting a new insurance policy tailored to their life stage and financial profile.
            | First, review the customer's existing policies (use {!@actions.GetCustomerPolicies_HF_Saathi}) to understand their current coverage.
            | Ask 2-3 focused questions to understand their need. Examples:
            |   - "What is your primary goal — protecting your family's income, planning for your child's education, or securing your retirement?"
            |   - "Do you already have a health insurance plan?"
            |   - "What monthly amount are you comfortable setting aside for insurance?"
            | Use {!@actions.GetInsuranceRecommendation_HF_Saathi} with inquiryType = "New" and the customer's stated need.
            | Present up to 3 product options. For each option, clearly state:
            |   - Insurance Type (e.g., "Term Life Insurance")
            |   - Why it suits them (personalized reason based on their profile)
            |   - Sum Assured options
            |   - Monthly installment amount(s)
            |   - Key benefits in 2 bullet points
            | Do not overwhelm. Ask the customer to select their preferred option before proceeding.
            | Once the customer confirms a choice, use {!@actions.CreatePolicyInquiry_HF_Saathi} to register their interest. Always get confirmation before creating the record.
            | After creating the inquiry, tell the customer that an HF Finance representative will reach out within 24 hours to proceed.
            | Always use {!@actions.CaptureFeedback_HF_Saathi} to log whether the customer was interested or not — this improves future recommendations.
        actions:
            GetCustomerPolicies_HF_Saathi: @actions.GetCustomerPolicies_HF_Saathi
                with contactId = @variables.verifiedContactId
            GetInsuranceRecommendation_HF_Saathi: @actions.GetInsuranceRecommendation_HF_Saathi
                with contactId = @variables.verifiedContactId
                with familyId = @variables.familyId
                with inquiryType = "New"
                with customerNeed = ...
            CreatePolicyInquiry_HF_Saathi: @actions.CreatePolicyInquiry_HF_Saathi
                with contactId = @variables.verifiedContactId
                with familyId = @variables.familyId
                with insuranceProduct = ...
                with premiumPlan = ...
                with messagingSessionId = @variables.RoutableId
            CaptureFeedback_HF_Saathi: @actions.CaptureFeedback_HF_Saathi
                with contactId = @variables.verifiedContactId
                with familyId = @variables.familyId
                with feedbackType = "Recommendation"
                with recommendedProduct = ...
                with wasActedOn = ...
                with rating = ...
                with customerComment = ...
    actions:
        GetCustomerPolicies_HF_Saathi:
            description: "Returns a list of all insurance policies held by the identified customer — used here to identify coverage gaps before recommending new products."
            label: "Get Customer Policies"
            require_user_confirmation: False
            include_in_progress_indicator: True
            progress_indicator_message: "Checking your current coverage..."
            source: "GetCustomerPolicies_HF_Saathi"
            target: "apex://GetCustomerPolicies_HF_Saathi"
            inputs:
                "contactId": string
                    description: "The Salesforce Contact ID of the verified customer."
                    label: "Contact ID"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
            outputs:
                "policySummary": string
                    description: "A formatted summary of all the customer's policies."
                    label: "Policy Summary"
                    is_displayable: False
                    filter_from_agent: True
                "activePolicyCount": string
                    description: "Number of currently active policies."
                    label: "Active Policy Count"
                    is_displayable: False
                    filter_from_agent: True
                "policyListJson": string
                    description: "JSON array of policy records for the recommendation engine."
                    label: "Policy List JSON"
                    is_displayable: False
                    filter_from_agent: True
        GetInsuranceRecommendation_HF_Saathi:
            description: "Fetches personalized insurance product recommendations for the customer based on their profile (life stage, income, age, family size), existing coverage gaps, payment behaviour, and Data Cloud insights (Next_Best_Product__c, Propensity_Score__c). Returns ranked product options with premium plans and personalized reasoning."
            label: "Get Insurance Recommendation"
            require_user_confirmation: False
            include_in_progress_indicator: True
            progress_indicator_message: "Finding the best options for you..."
            source: "GetInsuranceRecommendation_HF_Saathi"
            target: "apex://GetInsuranceRecommendation_HF_Saathi"
            inputs:
                "contactId": string
                    description: "The Salesforce Contact ID of the verified customer."
                    label: "Contact ID"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "familyId": string
                    description: "The Salesforce Account (Family) ID."
                    label: "Family ID"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "inquiryType": string
                    description: "Type of inquiry: 'New' for a new purchase, 'Recommendation' for proactive upsell/cross-sell."
                    label: "Inquiry Type"
                    is_required: True
                    is_user_input: False
                    complex_data_type_name: "lightning__textType"
                "customerNeed": string
                    description: "The customer's stated need or goal, captured from the conversation (e.g., 'protect family income', 'child education', 'retirement')."
                    label: "Customer Need"
                    is_required: False
                    is_user_input: True
                    complex_data_type_name: "lightning__textType"
            outputs:
                "recommendationSummary": string
                    description: "A formatted summary of recommended products with personalized reasoning, sum assured options, and monthly premiums."
                    label: "Recommendation Summary"
                    is_displayable: True
                    filter_from_agent: False
                "topRecommendedProduct": string
                    description: "The single highest-ranked recommended insurance product."
